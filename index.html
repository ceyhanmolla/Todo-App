<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Modern Pastel TODO App - Basit ve Etkin Görev Yönetimi">
    <title>Modern TODO App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23FFD4E5'>✓</text></svg>">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1>✨ My Tasks</h1>
                <p class="subtitle">Yarın'ın hedeflerini bugün planla</p>
            </div>
            <!-- Dark mode toggle -->
            <div class="theme-toggle">
                <button id="themeButton" class="btn-theme" aria-label="Toggle dark mode">🌓</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Input Section -->
            <section class="input-section">
                <form id="todoForm" class="todo-form">
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="todoInput" 
                            class="todo-input" 
                            placeholder="Yeni bir görev ekle..." 
                            maxlength="255"
                            autocomplete="off"
                            aria-label="Yeni görev ekle"
                        >
                        <button type="submit" class="btn-add" aria-label="Görev ekle">
                            <span class="btn-icon">+</span>
                        </button>
                    </div>
                    <div id="formError" class="form-error" role="alert"></div>
                </form>
            </section>

            <!-- Stats Section -->
            <section class="stats-section">
                <div class="stat-item">
                    <span class="stat-label">Toplam</span>
                    <span id="totalCount" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Aktif</span>
                    <span id="activeCount" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Tamamlanan</span>
                    <span id="completedCount" class="stat-value">0</span>
                </div>
            </section>

            <!-- Filter Section -->
            <section class="filter-section">
                <button class="filter-btn active" data-filter="all" aria-label="Tüm görevleri göster">
                    Tümü
                </button>
                <button class="filter-btn" data-filter="active" aria-label="Aktif görevleri göster">
                    Aktif
                </button>
                <button class="filter-btn" data-filter="completed" aria-label="Tamamlanan görevleri göster">
                    Tamamlanan
                </button>
            </section>

            <!-- Search Section -->
            <section class="search-section">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Görev ara..."
                    autocomplete="off"
                    aria-label="Görevleri ara"
                >
            </section>

            <!-- Task List -->
            <section class="task-section">
                <ul id="todoList" class="todo-list" role="list">
                    <!-- Tasks will be inserted here by JavaScript -->
                </ul>
                <div id="emptyState" class="empty-state">
                    <p class="empty-icon">📌</p>
                    <p class="empty-message">Henüz görev yok. Yeni bir görev ekleyerek başla!</p>
                </div>
            </section>

            <!-- Action Bar -->
            <section class="action-bar">
                <button id="clearCompleted" class="btn-clear" aria-label="Tamamlanan görevleri temizle">
                    Tamamlananları Sil
                </button>
            </section>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>&copy; 2026 Modern TODO App. Built with care. 💚</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
